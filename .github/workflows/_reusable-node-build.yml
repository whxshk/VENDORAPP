name: Reusable Node.js Build

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Node.js project (e.g., backend, clients/customer-app)"
        required: true
        type: string
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      build-command:
        description: "Build command to run"
        required: false
        type: string
        default: "npm run build"
      artifact-name:
        description: "Name for the uploaded artifact"
        required: true
        type: string
      install-flags:
        description: "Extra flags for npm ci (e.g., --legacy-peer-deps)"
        required: false
        type: string
        default: ""
      production-prune:
        description: "If true, re-run npm ci with --omit=dev after build to strip devDependencies"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci ${{ inputs.install-flags }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Prune to production dependencies
        if: inputs.production-prune
        run: npm ci --omit=dev ${{ inputs.install-flags }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            ${{ inputs.working-directory }}/dist/
            ${{ inputs.working-directory }}/node_modules/
            ${{ inputs.working-directory }}/package.json
          include-hidden-files: false
          retention-days: 3
