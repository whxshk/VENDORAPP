name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC federated auth with Azure
  contents: read

env:
  AZURE_WEBAPP_NAME: sharkband-api
  NODE_VERSION: "20"

jobs:
  build:
    uses: ./.github/workflows/_reusable-node-build.yml
    with:
      working-directory: backend
      node-version: "20"
      build-command: npm run build
      artifact-name: backend-build
      install-flags: "--legacy-peer-deps"
      production-prune: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./deploy

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./deploy
