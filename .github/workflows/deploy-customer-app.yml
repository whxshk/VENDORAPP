name: Deploy Customer App to Azure

on:
  push:
    branches: [main]
    paths:
      - "clients/customer-app/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/customer-app/package-lock.json

      - name: Install dependencies
        working-directory: clients/customer-app
        run: npm ci

      - name: Build
        working-directory: clients/customer-app
        env:
          VITE_API_BASE_URL: https://sharkband-api.azurewebsites.net/api/v1
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_CUSTOMER }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: clients/customer-app/dist
          skip_app_build: true
          skip_api_build: true
