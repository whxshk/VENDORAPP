version: '3.8'

services:
  nats:
    image: nats:2.10-alpine
    container_name: sharkband-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222" # HTTP monitoring port
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sharkband-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-mongodb://localhost:27017/Waddy}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET:-dev-refresh-secret-change-in-production}
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./src:/app/src
